<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8610A"/>
      <stop offset="100%" stop-color="#C47F17"/>
    </linearGradient>
    <!-- Subtle overlay for depth -->
    <linearGradient id="overlayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Wave gradient -->
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="waveGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Badge gradient -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
    <!-- Stat bar background -->
    <linearGradient id="statBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="12"/>
  <rect width="1200" height="400" fill="url(#overlayGrad)" rx="12"/>

  <!-- Decorative voice/communication wave arcs -->
  <!-- Large sweeping arc (top right) -->
  <path d="M 650 -80 Q 900 40 1250 -20" fill="none" stroke="url(#waveGrad1)" stroke-width="60" stroke-linecap="round"/>
  <path d="M 700 -40 Q 950 100 1280 30" fill="none" stroke="url(#waveGrad2)" stroke-width="40" stroke-linecap="round"/>
  <path d="M 750 0 Q 1000 140 1300 80" fill="none" stroke="url(#waveGrad3)" stroke-width="25" stroke-linecap="round"/>

  <!-- Mid-left arcs (voice emanation) -->
  <path d="M -50 180 Q 150 100 400 160" fill="none" stroke="url(#waveGrad2)" stroke-width="50" stroke-linecap="round"/>
  <path d="M -30 220 Q 180 140 420 200" fill="none" stroke="url(#waveGrad3)" stroke-width="30" stroke-linecap="round"/>

  <!-- Bottom flowing wave -->
  <path d="M 0 340 Q 200 280 400 310 Q 600 340 800 300 Q 1000 260 1200 290" fill="none" stroke="url(#waveGrad1)" stroke-width="45" stroke-linecap="round"/>
  <path d="M 0 360 Q 300 310 500 340 Q 700 370 900 330 Q 1100 290 1200 320" fill="none" stroke="url(#waveGrad2)" stroke-width="30" stroke-linecap="round"/>

  <!-- Small concentric arcs (top left, like sound waves) -->
  <path d="M 80 60 Q 80 120 140 120" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="3" stroke-linecap="round"/>
  <path d="M 60 40 Q 60 140 160 140" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 40 20 Q 40 160 180 160" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="2" stroke-linecap="round"/>

  <!-- Small concentric arcs (right side) -->
  <path d="M 1060 100 Q 1060 160 1120 160" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 1040 80 Q 1040 180 1140 180" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark: "8gent Jr" -->
  <!-- The prominent "8" -->
  <text x="600" y="168" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="bold" fill="#FFFFFF" letter-spacing="-2">
    <tspan fill="#FFFFFF" font-size="130" font-weight="900">8</tspan>gent Jr<tspan fill="#1A1612" font-size="30" fill-opacity="0.6">.</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="220" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" fill="#FFFFFF" fill-opacity="0.92" letter-spacing="0.5">
    No more gatekeeping. A voice for every kid.
  </text>

  <!-- Stat bar background -->
  <rect x="100" y="290" width="1000" height="52" rx="26" fill="url(#statBarGrad)"/>

  <!-- Stat badges -->
  <!-- 40 Games -->
  <rect x="148" y="299" width="170" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="233" y="322" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" fill="#FFFFFF" font-weight="600" letter-spacing="0.3">
    <tspan font-weight="700">40</tspan> Games
  </text>

  <!-- 7 Apps -->
  <rect x="348" y="299" width="150" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="423" y="322" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" fill="#FFFFFF" font-weight="600" letter-spacing="0.3">
    <tspan font-weight="700">7</tspan> Apps
  </text>

  <!-- Full AAC Engine -->
  <rect x="528" y="299" width="210" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="633" y="322" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" fill="#FFFFFF" font-weight="600" letter-spacing="0.3">
    Full AAC Engine
  </text>

  <!-- GDPR Compliant -->
  <rect x="768" y="299" width="210" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="873" y="322" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" fill="#FFFFFF" font-weight="600" letter-spacing="0.3">
    GDPR Compliant
  </text>

  <!-- Separator dots between badges -->
  <circle cx="333" cy="316" r="2.5" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="513" cy="316" r="2.5" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="753" cy="316" r="2.5" fill="#FFFFFF" fill-opacity="0.4"/>

  <!-- Subtle bottom edge line -->
  <line x1="200" y1="370" x2="1000" y2="370" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
</svg>